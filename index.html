<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <meta name="theme-color" content="#231F20">
    <title>Slope</title>
    <link rel="stylesheet" href="TemplateData/style.css">
    <script src="TemplateData/UnityProgress.js"></script>
  </head>
  <body>
    <div id="gameContainer" class="webgl-content"></div>
    
    <script>
      var canvas = document.createElement("canvas");
      canvas.id = "unity-canvas";
      document.getElementById("gameContainer").appendChild(canvas);
      
      var unityInstance = null;
      
      var gameConfig = {
        dataUrl: "Build/slope_data.unityweb",
        frameworkUrl: "Build/slope_framework.unityweb",
        codeUrl: "Build/slope_wasmcode.unityweb",
        memoryUrl: "Build/slope_memory.unityweb",
        wasmCodeUrl: "Build/slope_wasmcode.unityweb",
        wasmFrameworkUrl: "Build/slope_wasmframework.unityweb",
        TOTAL_MEMORY: 268435456,
        graphicsAPI: ["WebGL 2.0", "WebGL 1.0"],
        webglContextAttributes: {"preserveDrawingBuffer": false},
        splashScreenStyle: "Dark",
        backgroundColor: "#231F20"
      };
      
      function loadUnity() {
        if (window.UnityLoader !== undefined) {
          unityInstance = window.UnityLoader.instantiate("gameContainer", "Build/slope.json", {onProgress: UnityProgress});
        } else if (typeof window.createUnityInstance === 'function') {
          window.createUnityInstance(canvas, gameConfig, function(progress) {
            if (typeof UnityProgress !== 'undefined') {
              UnityProgress({}, progress);
            }
          }).then(function(unityInstance) {
            window.unityInstance = unityInstance;
          }).catch(function(message) {
            console.error("Failed to load Unity:", message);
          });
        } else {
          console.error("Unity loader not found");
        }
      }
      
      // Handle window resize
      window.addEventListener('resize', function() {
        var container = document.getElementById("gameContainer");
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
      });
      
      // Mobile detection
      if (/iPhone|iPad|iPod|Android/g.test(navigator.userAgent)) {
        document.getElementById("gameContainer").className += " unity-mobile";
        document.body.className += " unity-mobile";
      }
      
      // Load Unity when document is ready
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', loadUnity);
      } else {
        loadUnity();
      }
    </script>
    
    <script src="cheats.js"></script>
  </body>
</html>
