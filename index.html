<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <meta name="theme-color" content="#231F20">
    <title>Slope</title>
    <link rel="stylesheet" href="TemplateData/style.css">
    <script src="TemplateData/UnityProgress.js"></script>
  </head>
  <body>
    <div id="gameContainer" class="webgl-content"></div>
    <script src="TemplateData/unityloader41.js"></script>
    <script>
      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/slope.json";
      var container = document.querySelector("#gameContainer");
      var canvas = document.createElement("canvas");
      canvas.id = "canvas";
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      container.appendChild(canvas);
      
      var gameInstance = null;
      
      var config = {
        dataUrl: buildUrl + "/slope_data.unityweb",
        frameworkUrl: buildUrl + "/slope_framework.unityweb", 
        codeUrl: buildUrl + "/slope_wasmcode.unityweb",
        memoryUrl: buildUrl + "/slope_memory.unityweb",
        wasmCodeUrl: buildUrl + "/slope_wasmcode.unityweb",
        wasmFrameworkUrl: buildUrl + "/slope_wasmframework.unityweb",
        jsonUrl: loaderUrl,
        graphicsAPI: ["WebGL 2.0", "WebGL 1.0"],
        streamingAssetsUrl: "StreamingAssets",
        companyName: "IDnet",
        productName: "Slope",
        productVersion: "1.0",
        showBanner: UnityProgress,
        canvas: canvas,
        canFullscreen: true,
        containerElements: ["gameContainer"]
      };
      
      if (/iPhone|iPad|iPod|Android/g.test(navigator.userAgent)) {
        container.className = "unity-mobile";
        document.body.className = "unity-mobile";
      }
      
      window.addEventListener('resize', function() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      });
    </script>
    <script src="cheats.js"></script>
  </body>
</html>
