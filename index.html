<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <meta name="theme-color" content="#231F20">
    <title>Slope</title>
    <link rel="stylesheet" href="TemplateData/style.css">
    <script src="TemplateData/UnityProgress.js"></script>
    <!-- Add pako for decompression -->
    <script src="https://cdn.jsdelivr.net/npm/pako@2/dist/pako.min.js"></script>
  </head>
  <body>
    <div id="gameContainer" class="webgl-content">
      <canvas id="unity-canvas"></canvas>
    </div>
    
    <script>
      // Initialize Module for WASM
      window.Module = window.Module || {};
      
      // Configure game
      var gameConfig = {
        dataUrl: "Build/slope_data.unityweb",
        frameworkUrl: "Build/slope_framework.unityweb",
        codeUrl: "Build/slope_wasmcode.unityweb",
        memoryUrl: "Build/slope_memory.unityweb",
        wasmCodeUrl: "Build/slope_wasmcode.unityweb",
        wasmFrameworkUrl: "Build/slope_wasmframework.unityweb",
        TOTAL_MEMORY: 268435456,
        graphicsAPI: ["WebGL 2.0", "WebGL 1.0"],
        webglContextAttributes: {"preserveDrawingBuffer": false},
        splashScreenStyle: "Dark",
        backgroundColor: "#231F20"
      };

      window.WebGLGame = window.WebGLGame || {};
      window.WebGLGame.config = gameConfig;
      window.WebGLGame.config.canvas = document.getElementById('unity-canvas');
    </script>
    
    <script src="TemplateData/unityloader41.js"></script>
    <script src="cheats.js"></script>
  </body>
</html>
